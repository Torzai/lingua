<div class="min-h-screen bg-black flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Ambient glow -->
  <div class="absolute top-1/4 -right-24 w-80 h-80 bg-red-600/20 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 -left-24 w-80 h-80 bg-green-600/20 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md bg-zinc-900/80 backdrop-blur-xl border border-zinc-800 rounded-3xl shadow-2xl p-8">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-full bg-black border-2 border-zinc-700 flex items-center justify-center shadow-[0_0_25px_rgba(239,68,68,0.45)]">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="white" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </div>
    </div>

    <h1 class="text-4xl font-extrabold text-center mb-2 bg-gradient-to-r from-green-400 to-red-500 bg-clip-text text-transparent">
      Lingua
    </h1>
    <p class="text-center text-zinc-400 mb-8">Crea tu cuenta</p>

    <form (ngSubmit)="onRegister()" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-zinc-300 mb-2">Email</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="tu@email.com"
          class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-white placeholder-zinc-500 focus:border-red-500 focus:ring-2 focus:ring-red-500/30 focus:outline-none transition"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-zinc-300 mb-2">Nombre</label>
        <input
          [(ngModel)]="nombre"
          name="nombre"
          type="text"
          placeholder="Tu nombre"
          class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-white placeholder-zinc-500 focus:border-red-500 focus:ring-2 focus:ring-red-500/30 focus:outline-none transition"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-zinc-300 mb-2">Contraseña</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-white placeholder-zinc-500 focus:border-red-500 focus:ring-2 focus:ring-red-500/30 focus:outline-none transition"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-zinc-300 mb-2">Idioma nativo</label>
        <select
          [(ngModel)]="idiomaNativo"
          name="idiomaNativo"
          class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 rounded-xl text-white focus:border-red-500 focus:ring-2 focus:ring-red-500/30 focus:outline-none transition"
        >
          <option value="es" class="bg-zinc-800 text-white">Español</option>
          <option value="it" class="bg-zinc-800 text-white">Italiano</option>
        </select>
      </div>

      <div *ngIf="error" class="bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-xl text-sm font-semibold">
        {{ error }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-gradient-to-r from-red-500 to-red-600 text-white font-bold py-3 rounded-xl shadow-[0_0_20px_rgba(239,68,68,0.35)] hover:shadow-[0_0_30px_rgba(239,68,68,0.55)] transition disabled:opacity-50"
      >
        {{ loading ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="text-center text-zinc-400 mt-6">
      ¿Ya tienes cuenta?
      <button
        (click)="goToLogin()"
        class="text-red-400 font-bold hover:text-red-300 hover:underline"
      >
        Inicia sesión aquí
      </button>
    </p>
  </div>
</div>
