<div class="min-h-screen bg-cream flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Ambient glow -->
  <div class="absolute top-1/4 -right-24 w-80 h-80 bg-terracotta-100/60 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 -left-24 w-80 h-80 bg-forest-100/60 rounded-full blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md bg-paper border border-forest-100 rounded-3xl shadow-xl p-8">
    <!-- Logo -->
    <div class="flex justify-center mb-6">
      <div class="w-16 h-16 rounded-full bg-terracotta-50 border-2 border-terracotta-100 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#E2693B" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
      </div>
    </div>

    <h1 class="text-4xl font-serif font-bold text-center mb-1 text-forest-500">
      Lingua
    </h1>
    <p class="text-center text-xs font-semibold tracking-[0.2em] text-ink-light uppercase mb-8">
      Italiano · Español
    </p>

    <form (ngSubmit)="onRegister()" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold text-ink mb-2">Email</label>
        <input
          [(ngModel)]="email"
          name="email"
          type="email"
          placeholder="tu@email.com"
          class="w-full px-4 py-3 bg-cream border border-terracotta-100 rounded-xl text-ink placeholder-ink-light/60 focus:border-terracotta-500 focus:ring-2 focus:ring-terracotta-500/20 focus:outline-none transition"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-ink mb-2">Nombre</label>
        <input
          [(ngModel)]="nombre"
          name="nombre"
          type="text"
          placeholder="Tu nombre"
          class="w-full px-4 py-3 bg-cream border border-terracotta-100 rounded-xl text-ink placeholder-ink-light/60 focus:border-terracotta-500 focus:ring-2 focus:ring-terracotta-500/20 focus:outline-none transition"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-ink mb-2">Contraseña</label>
        <input
          [(ngModel)]="password"
          name="password"
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 bg-cream border border-terracotta-100 rounded-xl text-ink placeholder-ink-light/60 focus:border-terracotta-500 focus:ring-2 focus:ring-terracotta-500/20 focus:outline-none transition"
        />
      </div>

      <div>
        <label class="block text-sm font-semibold text-ink mb-2">Idioma nativo</label>
        <select
          [(ngModel)]="idiomaNativo"
          name="idiomaNativo"
          class="w-full px-4 py-3 bg-cream border border-terracotta-100 rounded-xl text-ink focus:border-terracotta-500 focus:ring-2 focus:ring-terracotta-500/20 focus:outline-none transition"
        >
          <option value="es" class="bg-paper text-ink">Español</option>
          <option value="it" class="bg-paper text-ink">Italiano</option>
        </select>
      </div>

      <div *ngIf="error" class="bg-terracotta-50 border border-terracotta-100 text-terracotta-600 p-3 rounded-xl text-sm font-semibold">
        {{ error }}
      </div>

      <button
        type="submit"
        [disabled]="loading"
        class="w-full bg-gradient-to-r from-terracotta-500 to-terracotta-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-terracotta-500/30 hover:shadow-xl hover:shadow-terracotta-500/40 transition disabled:opacity-50 flex items-center justify-center gap-2"
      >
        {{ loading ? 'Registrando...' : 'Registrarse' }}
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25 21 12m0 0-3.75 3.75M21 12H3" />
        </svg>
      </button>
    </form>

    <p class="text-center text-ink-light mt-6">
      ¿Ya tienes cuenta?
      <button
        (click)="goToLogin()"
        class="text-terracotta-500 font-bold hover:text-terracotta-600 hover:underline"
      >
        Inicia sesión aquí
      </button>
    </p>
  </div>
</div>
